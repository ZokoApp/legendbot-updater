<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020617">
<link rel="manifest" href="/manifest.json">

    navigator.serviceWorker.register("/sw.js");

<title>Legends Bot Updater</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #020617;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

/* ============ CANVAS MATRIX ============ */
#matrixCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ============ CARD ============ */
.card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 400px;
  background: rgba(2,6,23,0.75);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 26px;
  padding: 36px 28px 30px;
  box-shadow:
    0 40px 100px rgba(0,0,0,0.8),
    0 0 0 1px rgba(37,99,235,0.06);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}

.logo-wrap img {
  width: 78px;
  height: 78px;
  border-radius: 22px;
  box-shadow:
    0 0 0 3px rgba(37,99,235,0.3),
    0 0 0 7px rgba(37,99,235,0.07),
    0 16px 40px rgba(0,0,0,0.6);
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}

h1 {
  text-align: center;
  font-size: 1.45rem;
  font-weight: 800;
  color: #f1f5f9;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.subtitle {
  text-align: center;
  font-size: 0.72rem;
  color: #475569;
  margin-bottom: 30px;
  letter-spacing: 0.2px;
}

.field { margin-bottom: 10px; }

.field label {
  display: block;
  font-size: 0.68rem;
  color: #64748b;
  margin-bottom: 7px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 600;
}

.input-wrap { position: relative; }

.input-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  stroke: #334155;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
}

input {
  width: 100%;
  padding: 13px 14px 13px 38px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.07);
  background: rgba(2,6,23,0.9);
  color: #e2e8f0;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

input:focus {
  border-color: rgba(37,99,235,0.55);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

input::placeholder { color: #1e293b; }

.btn {
  width: 100%;
  margin-top: 18px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.88rem;
  background: #2563eb;
  color: #fff;
  letter-spacing: 0.2px;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.4);
}

.btn:hover  { background: #1d4ed8; box-shadow: 0 4px 28px rgba(37,99,235,0.55); }
.btn:active { transform: scale(0.98); }
.btn:disabled { background: #1e293b; cursor: not-allowed; box-shadow: none; opacity: 0.5; }

.status {
  margin-top: 16px;
  padding: 13px 15px;
  border-radius: 12px;
  font-size: 0.8rem;
  display: none;
  align-items: center;
  gap: 10px;
  line-height: 1.4;
}

.status.loading {
  display: flex;
  background: rgba(37,99,235,0.08);
  border: 1px solid rgba(37,99,235,0.18);
  color: #93c5fd;
}

.status.success {
  display: flex;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
  color: #86efac;
}

.status.error {
  display: flex;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.18);
  color: #fca5a5;
}

.spinner {
  width: 15px;
  height: 15px;
  border: 2px solid rgba(147,197,253,0.2);
  border-top-color: #93c5fd;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.active-url {
  margin-top: 16px;
  padding: 11px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  display: none;
}

.active-url .au-label {
  font-size: 0.63rem;
  color: #334155;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.active-url .au-val {
  font-size: 0.72rem;
  color: #475569;
  word-break: break-all;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.repo-tag {
  margin-top: 20px;
  text-align: center;
  font-size: 0.62rem;
  color: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.repo-tag svg {
  width: 11px;
  height: 11px;
  fill: #1e293b;
}
</style>
</head>

  <div id="status" class="status"></div>

  <div class="active-url" id="activeUrl">
    <div class="au-label">URL activa</div>
    <div class="au-val" id="activeUrlVal"></div>
  </div>

  <div class="repo-tag">
    <svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    Legends Bot
  </div>

</div>

<script>
/* ============ MATRIX BINARY RAIN ============ */
const canvas  = document.getElementById("matrixCanvas");
const ctx     = canvas.getContext("2d");

const FONT_SIZE = 13;
const CHARS     = "01";
const COLOR     = "rgba(37,99,235,"; // azul del tema

let columns = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / FONT_SIZE);
  columns = Array.from({ length: cols }, () => ({
    y:      Math.random() * -canvas.height,
    speed:  0.4 + Math.random() * 0.8,
    opacity: 0.04 + Math.random() * 0.08,
    length: 8 + Math.floor(Math.random() * 20)
  }));
}

function draw() {
  // Fondo con trail suave
  ctx.fillStyle = "rgba(2,6,23,0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = `${FONT_SIZE}px 'SF Mono', 'Fira Code', monospace`;

  columns.forEach((col, i) => {
    const x = i * FONT_SIZE;

    for (let j = 0; j < col.length; j++) {
      const alpha = col.opacity * (1 - j / col.length);
      // El primer char (cabeza) es más brillante
      const isHead = j === 0;
      if (isHead) {
        ctx.fillStyle = `rgba(147,197,253,${col.opacity * 2.5})`;
      } else {
        ctx.fillStyle = `${COLOR}${alpha})`;
      }
      const char = CHARS[Math.floor(Math.random() * CHARS.length)];
      ctx.fillText(char, x, col.y - j * FONT_SIZE);
    }

    col.y += col.speed;

    // Resetear columna cuando sale de pantalla
    if (col.y - col.length * FONT_SIZE > canvas.height) {
      col.y      = Math.random() * -200;
      col.speed  = 0.4 + Math.random() * 0.8;
      col.opacity = 0.04 + Math.random() * 0.08;
      col.length = 8 + Math.floor(Math.random() * 20);
    }
  });

  requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);
resize();
draw();

/* ============ GITHUB UPDATE ============ */
const GITHUB_TOKEN = "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";
const GITHUB_OWNER = "ZokoApp";
const GITHUB_REPO  = "legends-bot-v2";
const FILE_PATH    = "config.js";
const API_URL      = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`;

const HEADERS = {
  "Authorization": `token ${GITHUB_TOKEN}`,
  "Accept":        "application/vnd.github.v3+json",
  "Content-Type":  "application/json"
};

function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = `status ${type}`;
  if (type === "loading") {
    el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  } else if (type === "success") {
    el.innerHTML = `<span>✅</span><span>${msg}</span>`;
  } else {
    el.innerHTML = `<span>❌</span><span>${msg}</span>`;
  }
}

async function updateUrl() {
  const url = document.getElementById("urlInput").value.trim();

  if (!url) { setStatus("error", "Ingresá la URL de Cloudflare"); return; }
  if (!url.startsWith("https://")) { setStatus("error", "La URL debe empezar con https://"); return; }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  setStatus("loading", "Leyendo config.js actual...");

  try {
    const getRes = await fetch(API_URL, { headers: HEADERS });
    if (!getRes.ok) throw new Error(`No se pudo leer config.js (${getRes.status})`);
    const fileData = await getRes.json();

    setStatus("loading", "Subiendo nueva URL a GitHub...");

    const newContent = `// config.js\nconst API_BASE = "${url}";`;
    const encoded    = btoa(unescape(encodeURIComponent(newContent)));

    const putRes = await fetch(API_URL, {
      method:  "PUT",
      headers: HEADERS,
      body: JSON.stringify({
        message: `🔧 Update API_BASE → ${url}`,
        content: encoded,
        sha:     fileData.sha
      })
    });

    if (!putRes.ok) throw new Error(`Error al actualizar GitHub (${putRes.status})`);

    setStatus("success", "¡Listo! config.js actualizado. Vercel redeploy en ~30s");

    const au = document.getElementById("activeUrl");
    document.getElementById("activeUrlVal").innerText = url;
    au.style.display = "block";
    document.getElementById("urlInput").value = "";

  } catch (err) {
    setStatus("error", err.message);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("urlInput").addEventListener("keydown", e => {
  if (e.key === "Enter") updateUrl();
});
</script>
