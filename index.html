<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegendBot Updater</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 32px 28px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6);
}

.logo {
  text-align: center;
  margin-bottom: 6px;
}

.logo img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid rgba(37,99,235,0.35);
  box-shadow: 0 0 0 6px rgba(37,99,235,0.08);
}

h1 {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: #f1f5f9;
  margin: 12px 0 4px;
}

.subtitle {
  text-align: center;
  font-size: 0.72rem;
  color: #64748b;
  margin-bottom: 28px;
}

label {
  display: block;
  font-size: 0.7rem;
  color: #94a3b8;
  margin-bottom: 7px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.08);
  background: #020617;
  color: #e2e8f0;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 20px;
}

input:focus {
  border-color: rgba(37,99,235,0.6);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}

input::placeholder { color: #374151; }

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.9rem;
  background: #2563eb;
  color: #fff;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

button:hover  { background: #1d4ed8; }
button:active { transform: scale(0.98); }
button:disabled { background: #1e3a5f; cursor: not-allowed; opacity: 0.6; }

.status {
  margin-top: 20px;
  padding: 14px 16px;
  border-radius: 14px;
  font-size: 0.82rem;
  display: none;
  align-items: center;
  gap: 10px;
}

.status.loading {
  display: flex;
  background: rgba(37,99,235,0.1);
  border: 1px solid rgba(37,99,235,0.2);
  color: #93c5fd;
}

.status.success {
  display: flex;
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.2);
  color: #86efac;
}

.status.error {
  display: flex;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #fca5a5;
}

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(147,197,253,0.3);
  border-top-color: #93c5fd;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.current-url {
  margin-top: 20px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  font-size: 0.7rem;
  color: #475569;
}

.current-url span {
  color: #64748b;
  word-break: break-all;
}

.footer {
  margin-top: 24px;
  text-align: center;
  font-size: 0.65rem;
  color: #1e293b;
}
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <img src="icons/icon-192.png" onerror="this.style.display='none'">
  </div>

  <h1>LegendBot Updater</h1>
  <div class="subtitle">Actualizá la URL del túnel</div>

  <label>Nueva URL de Cloudflare</label>
  <input
    id="urlInput"
    type="text"
    placeholder="https://algo-random.trycloudflare.com"
    autocomplete="off"
    spellcheck="false"
  >

  <button id="btn" onclick="updateUrl()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"/>
      <line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/>
      <line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    Actualizar en GitHub
  </button>

  <div id="status" class="status"></div>

  <div class="current-url" id="currentUrlBox" style="display:none">
    URL activa: <span id="currentUrl"></span>
  </div>

  <div class="footer">legends Bot</div>

</div>

<script>
const GITHUB_TOKEN  = "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";
const GITHUB_OWNER  = "ZokoApp";
const GITHUB_REPO   = "legends-bot-v2";
const FILE_PATH     = "config.js";
const API_URL       = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`;

const headers = {
  "Authorization": `token ${GITHUB_TOKEN}`,
  "Accept":        "application/vnd.github.v3+json",
  "Content-Type":  "application/json"
};

function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = `status ${type}`;

  if (type === "loading") {
    el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  } else if (type === "success") {
    el.innerHTML = `<span>✅</span><span>${msg}</span>`;
  } else {
    el.innerHTML = `<span>❌</span><span>${msg}</span>`;
  }
}

async function updateUrl() {
  const url = document.getElementById("urlInput").value.trim();

  if (!url) {
    setStatus("error", "Ingresá la URL de Cloudflare");
    return;
  }

  if (!url.startsWith("https://")) {
    setStatus("error", "La URL debe comenzar con https://");
    return;
  }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  setStatus("loading", "Obteniendo archivo actual...");

  try {
    // 1. Obtener SHA actual del archivo
    const getRes = await fetch(API_URL, { headers });
    if (!getRes.ok) throw new Error(`Error al leer config.js: ${getRes.status}`);
    const fileData = await getRes.json();
    const sha = fileData.sha;

    setStatus("loading", "Actualizando config.js...");

    // 2. Nuevo contenido
    const newContent = `// config.js\nconst API_BASE = "${url}";`;
    const encoded    = btoa(unescape(encodeURIComponent(newContent)));

    // 3. Commit al repo
    const putRes = await fetch(API_URL, {
      method:  "PUT",
      headers,
      body: JSON.stringify({
        message: `🔧 Update API_BASE → ${url}`,
        content: encoded,
        sha:     sha
      })
    });

    if (!putRes.ok) throw new Error(`Error al actualizar: ${putRes.status}`);

    setStatus("success", "¡URL actualizada en GitHub exitosamente!");

    // Mostrar URL activa
    document.getElementById("currentUrl").innerText = url;
    document.getElementById("currentUrlBox").style.display = "block";
    document.getElementById("urlInput").value = "";

  } catch (err) {
    setStatus("error", err.message);
  } finally {
    btn.disabled = false;
  }
}

// Enter para enviar
document.getElementById("urlInput").addEventListener("keydown", e => {
  if (e.key === "Enter") updateUrl();
});
</script>

</body>
</html>
